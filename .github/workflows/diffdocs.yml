name: DiffDocs Repository Intelligence Integration

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  transmit-telemetry:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout full repository git history
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Critical: Fetches all history so git can calculate the delta diff

      # Step 2: Extract metadata and safely stream JSON to your backend via an inline Python runtime
      - name: Extract Diff and Dispatch Telemetry
        shell: python
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          REPO_NAME: ${{ github.repository }}
          BACKEND_TARGET_URL: "https://murkiness-slacking-pagan.ngrok-free.dev" # Your active Ngrok link
          # 🔥 Hardcode your matching testing token here for local validation
          WEBHOOK_SECRET: "SuperSecretDiffDocsToken2026" 
        run: |
          import os
          import subprocess
          import json
          import hmac
          import hashlib
          import urllib.request

          base_branch = os.environ["BASE_BRANCH"]
          repo_name = os.environ["REPO_NAME"]
          secret = os.environ["WEBHOOK_SECRET"]
          
          subprocess.run(["git", "fetch", "origin", base_branch], check=True)
          diff_bytes = subprocess.check_output(["git", "diff", f"origin/{base_branch}...HEAD"])
          diff_content = diff_bytes.decode("utf-8", errors="ignore")
          commit_sha = subprocess.check_output(["git", "rev-parse", "HEAD"]).decode("utf-8").strip()

          payload = {
              "repo_identifier": repo_name,
              "commit_sha": commit_sha,
              "diff_content": diff_content
          }
          
          # Convert payload to strict string format for consistent signing
          payload_bytes = json.dumps(payload).encode("utf-8")
          
          # 🔥 Generate the SHA256 HMAC cryptographic signature fingerprint
          signature = hmac.new(
              secret.encode("utf-8"),
              payload_bytes,
              hashlib.sha256
          ).hexdigest()

          endpoint_url = f"{os.environ['BACKEND_TARGET_URL'].rstrip('/')}/webhook/github"
          req = urllib.request.Request(
              endpoint_url,
              data=payload_bytes,
              headers={
                  "Content-Type": "application/json",
                  "X-DiffDocs-Signature": signature # Attach signature in the custom header
              },
              method="POST"
          )
          
          print(f"Dispatching SECURED payload package to core engine...")
          try:
              with urllib.request.urlopen(req) as response:
                  print(f"🚀 Success! Status: {response.status}")
                  print(response.read().decode())
          except Exception as error:
              print(f"🚨 Transmission failed or dropped by security shield: {error}")
              raise SystemExit(1)
